<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blocky Mines - Textures</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        .overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .window { background: #c6c6c6; border: 4px solid #000; padding: 25px; text-align: center; box-shadow: inset -4px -4px #555, inset 4px 4px #fff; width: 320px; color: #333; }
        .mc-btn { width: 100%; padding: 12px; margin: 6px 0; border: 2px solid #000; background: #666; color: white; font-weight: bold; cursor: pointer; box-shadow: inset -3px -3px #333, inset 3px 3px #AAA; }
        
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 1001; }
        .hotbar { display: flex; background: rgba(0,0,0,0.5); border: 3px solid #888; padding: 3px; }
        .slot { width: 45px; height: 45px; border: 3px solid #444; margin: 0 3px; cursor: pointer; background-size: cover; image-rendering: pixelated; }
        .active { border-color: #fff; box-shadow: 0 0 15px #fff; }

        #mobile-controls { position: absolute; bottom: 120px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; pointer-events: none; }
        .joy-base { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 50%; position: relative; pointer-events: auto; }
        #stick { width: 35px; height: 35px; background: white; border-radius: 50%; position: absolute; left: 32px; top: 32px; pointer-events: none; }
        .action-btns { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .act-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1 style="color:white; text-shadow: 4px 4px #000;">BLOCKY MINES</h1>
        <div class="window">
            <button class="mc-btn" onclick="bootGame('pc')">PLAY PC</button>
            <button class="mc-btn" onclick="bootGame('mobile')">PLAY MOBILE</button>
        </div>
    </div>

    <div id="hud">
        <div class="hotbar">
            <div class="slot active" id="s0" onclick="selectSlot(0)" style="background-color: #5cb85c;"></div>
            <div class="slot" id="s1" onclick="selectSlot(1)" style="background-color: #808080;"></div>
            <div class="slot" id="s2" onclick="selectSlot(2)" style="background-color: #795548;"></div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="joy-base" id="joy"><div id="stick"></div></div>
        <div class="action-btns">
            <div class="act-btn" onpointerdown="interact(true)">BUILD</div>
            <div class="act-btn" style="background:rgba(255,0,0,0.3)" onpointerdown="interact(false)">BREAK</div>
            <div class="act-btn" onpointerdown="if(vY===0) vY=0.18">JUMP</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, raycaster, blocks = [], keys = {};
        let isPaused = true, isMobile = false, selected = 0;
        let yaw = 0, pitch = 0, vY = 0, moveX = 0, moveZ = 0;

        // --- TEXTURE CONFIGURATION ---
        const loader = new THREE.TextureLoader();
        function loadPixelTexture(url) {
            const t = loader.load(url);
            t.magFilter = THREE.NearestFilter; // KEEPS IT PIXELATED
            t.minFilter = THREE.NearestFilter;
            return t;
        }

        // Replace these URLs with your 16x16 image links!
        const textures = {
            grass: loadPixelTexture('https://kovach750.itch.io/my-first-grass-tile'), // Placeholder
            stone: loadPixelTexture('https://opengameart.org/content/16x-16-stone-set#'),
            dirt: loadPixelTexture('https://www.istockphoto.com/id/vektor/latar-belakang-blok-tanah-gaya-minecraft-pixel-konsep-game-ground-pixelated-latar-gm1300167320-392576579')
        };

        const materials = [
            new THREE.MeshStandardMaterial({ map: textures.grass }),
            new THREE.MeshStandardMaterial({ map: textures.stone }),
            new THREE.MeshStandardMaterial({ map: textures.dirt })
        ];

        function bootGame(device) {
            isMobile = (device === 'mobile');
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            if(isMobile) document.getElementById('mobile-controls').style.display = 'flex';
            else document.body.requestPointerLock();
            init();
            isPaused = false;
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10); scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // Generate textured floor
            for(let x=-8; x<=8; x++) {
                for(let z=-8; z<=8; z++) {
                    addBlock(x, 2, z, materials[0]);
                }
            }
            camera.position.set(0, 5, 5); raycaster = new THREE.Raycaster();
            loop();
        }

        function addBlock(x, y, z, mat) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
            b.position.set(x,y,z);
            scene.add(b); blocks.push(b);
        }

        function interact(isPlace) {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(blocks);
            if(hits.length > 0) {
                const h = hits[0];
                if(isPlace) {
                    const p = h.object.position.clone().add(h.face.normal);
                    addBlock(p.x, p.y, p.z, materials[selected]);
                } else if(h.object.position.y !== 2) {
                    scene.remove(h.object);
                    blocks.splice(blocks.indexOf(h.object), 1);
                }
            }
        }

        function selectSlot(i) {
            document.querySelectorAll('.slot').forEach(s=>s.classList.remove('active'));
            document.getElementById('s'+i).classList.add('active');
            selected = i;
        }

        // --- CONTROLS ---
        window.addEventListener('mousemove', e => {
            if(!isPaused && document.pointerLockElement) {
                yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        });

        let tData = {};
        window.addEventListener('touchstart', e => { 
            for(let t of e.changedTouches) if(t.target.tagName === 'CANVAS') tData[t.identifier] = {x:t.clientX, y:t.clientY};
        });
        window.addEventListener('touchmove', e => {
            if(isPaused) return;
            for(let t of e.changedTouches) {
                if(tData[t.identifier]) {
                    yaw -= (t.clientX - tData[t.identifier].x) * 0.006;
                    pitch -= (t.clientY - tData[t.identifier].y) * 0.006;
                    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                    tData[t.identifier] = {x:t.clientX, y:t.clientY};
                }
            }
        });

        window.onmousedown = e => { if(!isPaused && !isMobile) interact(e.button !== 0); };
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        const joy = document.getElementById('joy');
        joy.addEventListener('touchmove', e => {
            const r = joy.getBoundingClientRect();
            moveX = (e.touches[0].clientX - (r.left + 50)) / 35;
            moveZ = (e.touches[0].clientY - (r.top + 50)) / 35;
            document.getElementById('stick').style.transform = `translate(${moveX*12}px, ${moveZ*12}px)`;
        }, {passive: false});
        joy.addEventListener('touchend', () => { moveX=0; moveZ=0; document.getElementById('stick').style.transform='none'; });

        function loop() {
            requestAnimationFrame(loop);
            if(isPaused) return;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            
            let dx = moveX * 0.12, dz = moveZ * 0.12;
            if(!isMobile) {
                if(keys['KeyW']) dz = -0.15; if(keys['KeyS']) dz = 0.15;
                if(keys['KeyA']) dx = -0.15; if(keys['KeyD']) dx = 0.15;
            }

            const vec = new THREE.Vector3(dx, 0, dz).applyQuaternion(camera.quaternion);
            vec.y = 0; camera.position.add(vec);

            vY -= 0.008; camera.position.y += vY;
            if(camera.position.y < 4) { camera.position.y = 4; vY = 0; if(keys['Space']) vY = 0.18; }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
