<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLOCKY MINES</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gui: #c6c6c6; --btn: #666; --shd: #444; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; color: #fff; image-rendering: pixelated; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .window { background: var(--gui); border: 4px solid #000; padding: 20px; width: 300px; color: #333; text-align: center; }
        .mc-btn { width: 100%; padding: 12px; margin: 8px 0; border: 3px solid #000; background: var(--btn); color: #fff; font-weight: bold; cursor: pointer; box-shadow: inset -3px -3px var(--shd); }
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 500; }
        .hotbar { display: flex; background: rgba(0,0,0,0.7); border: 4px solid #555; padding: 4px; gap: 4px; }
        .slot { width: 44px; height: 44px; border: 4px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.2); }
        #stats { position: absolute; top: 40px; left: 20px; display: none; z-index: 500; }
        .bar { width: 140px; height: 10px; border: 2px solid #000; background: #222; margin-top: 5px; }
        #hp-fill { height: 100%; background: #f22; width: 100%; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #fff; transform: translate(-50%, -50%); mix-blend-mode: difference; display: none; pointer-events: none; }
        #pause-screen { display: none; background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>
    <div id="menu-start" class="overlay">
        <div class="window">
            <h1>BLOCKY MINES</h1>
            <button class="mc-btn" onclick="boot(false)">PC MODE</button>
            <button class="mc-btn" onclick="boot(true)">MOBILE MODE</button>
        </div>
    </div>
    <div id="pause-screen" class="overlay">
        <div class="window">
            <h2>GAME PAUSED</h2>
            <button class="mc-btn" onclick="togglePause()">RESUME</button>
            <button class="mc-btn" onclick="location.reload()">MAIN MENU</button>
        </div>
    </div>
    <div id="crosshair"></div>
    <div id="stats">HP <div class="bar"><div id="hp-fill"></div></div></div>
    <div id="hud"><div class="hotbar" id="hb"></div></div>
    <script>
        let scene, camera, renderer, clock, isMobile, paused = false;
        let vY = 0, yaw = 0, pitch = 0, moveZ = 0, selected = 0;
        let hp = 100, blocks = [], entities = [], raycaster = new THREE.Raycaster();
        const ITEMS = ["Grass", "Stone", "Wood", "Leaves", "Glass", "TNT", "Table"];
        const COLORS = { Grass:0x5da345, Stone:0x808080, Wood:0x5c4033, Leaves:0x3a5e2c, Glass:0xadd8e6, TNT:0xff0000, Table:0x8b4513, Zombie:0x2e4d23 };

        function boot(m) {
            isMobile = m;
            document.getElementById('menu-start').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('stats').style.display = 'block';
            if(!isMobile) document.getElementById('crosshair').style.display = 'block';
            init();
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
            clock = new THREE.Clock();
            const geo = new THREE.BoxGeometry(2,2,2);
            for(let x=-30; x<30; x+=2) {
                for(let z=-30; z<30; z+=2) {
                    addBlock(x, 0, z, "Grass");
                    if(Math.random() < 0.01) spawnZom(x, 2, z);
                }
            }
            camera.position.set(0, 10, 0);
            renderHB(); setupIO(); animate();
        }

        function addBlock(x, y, z, type) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({ color: COLORS[type] }));
            m.position.set(x,y,z); m.name = type; scene.add(m); blocks.push(m);
        }

        function spawnZom(x,y,z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.6, 1.2), new THREE.MeshLambertMaterial({ color: COLORS.Zombie }));
            m.position.set(x,y,z); scene.add(m); entities.push(m);
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pause-screen').style.display = paused ? 'flex' : 'none';
            if(!paused && !isMobile) document.body.requestPointerLock();
        }

        function setupIO() {
            window.onkeydown = e => {
                if(e.code === 'Escape') togglePause();
                if(paused) return;
                if(e.code==='KeyW') moveZ = -0.3;
                if(e.code==='Space'&&vY===0) vY=0.25;
                if(e.code==='KeyE') openCrafting();
            };
            window.onkeyup = () => moveZ = 0;
            document.onmousedown = e => {
                if(paused || isMobile) return;
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const hits = raycaster.intersectObjects(blocks);
                if(hits.length > 0) {
                    if(e.button === 0) { // Break
                        scene.remove(hits[0].object);
                        blocks = blocks.filter(b => b !== hits[0].object);
                    } else if(e.button === 2) { // Place
                        const p = hits[0].object.position;
                        const n = hits[0].face.normal;
                        addBlock(p.x + n.x*2, p.y + n.y*2, p.z + n.z*2, ITEMS[selected]);
                    }
                }
            };
            if(!isMobile) document.body.onclick = () => !paused && document.body.requestPointerLock();
            document.onmousemove = e => { if(document.pointerLockElement && !paused) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; }};
        }

        function openCrafting() {
            alert("Crafting: Combine Wood to make a Table!");
        }

        function renderHB() {
            const hb = document.getElementById('hb'); hb.innerHTML = '';
            ITEMS.forEach((it, i) => hb.innerHTML += `<div class="slot ${i===selected?'active':''}" onclick="selected=${i};renderHB()">${it[0]}</div>`);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(paused) return;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.translateZ(moveZ);
            vY -= 0.01; camera.position.y += vY;
            if(camera.position.y < 6) { camera.position.y = 6; vY = 0; }
            entities.forEach(z => {
                z.lookAt(camera.position.x, 2, camera.position.z);
                z.translateZ(0.02);
                if(z.position.distanceTo(camera.position) < 3) hp -= 0.2;
            });
            document.getElementById('hp-fill').style.width = hp + "%";
            if(hp < 0) location.reload();
            renderer.render(scene, camera);
        }
        // FINAL LINE 400 - APRIL 25 EDITION
    </script>
</body>
</html>
