<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLOCKY MINES - Full Re-Add</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #5cb85c; --bg: #111; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        
        /* Menu System */
        #menu-container { position: absolute; top: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 1000; }
        .panel { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #444; width: 300px; text-align: center; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-mode { background: #444; width: 48%; display: inline-block; }
        .active { background: #3498db !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #555; background: #000; color: white; text-align: center; box-sizing: border-box; }

        /* Mobile HUD */
        #mobile-ui { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 100; pointer-events: auto; }
        #stick { position: absolute; left: 40px; top: 40px; width: 40px; height: 40px; background: white; border-radius: 50%; }
        #mobile-btns { position: absolute; bottom: 30px; right: 30px; display: none; z-index: 100; gap: 10px; }
        .m-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <div class="panel">
            <h1>BLOCKY MINES</h1>
            <div>
                <button id="b-limit" class="btn btn-mode active" onclick="setMode('limitless')">LIMITLESS</button>
                <button id="b-surv" class="btn btn-mode" onclick="setMode('survival')">SURVIVAL</button>
            </div>
            <button class="btn" onclick="start('pc')">PLAY ON PC</button>
            <button class="btn" style="background:#666" onclick="start('mobile')">PLAY ON MOBILE</button>
            <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
            <input type="text" id="room" placeholder="ROOM CODE (OPTIONAL)">
        </div>
    </div>

    <div id="mobile-ui"><div id="stick"></div></div>
    <div id="mobile-btns">
        <div class="m-btn" onpointerdown="doJump()">JUMP</div>
    </div>

    <script>
        let scene, camera, renderer, isMobile = false, mode = 'limitless';
        let moveX = 0, moveZ = 0, yaw = 0, pitch = 0, vY = 0;
        let keys = {}, peer, conn;

        function setMode(m) {
            mode = m;
            document.getElementById('b-limit').classList.toggle('active', m === 'limitless');
            document.getElementById('b-surv').classList.toggle('active', m === 'survival');
        }

        function start(device) {
            isMobile = (device === 'mobile');
            const roomCode = document.getElementById('room').value.trim().toLowerCase();
            document.getElementById('menu-container').style.display = 'none';
            if(isMobile) {
                document.getElementById('mobile-ui').style.display = 'block';
                document.getElementById('mobile-btns').style.display = 'flex';
            } else {
                renderer.domElement.requestPointerLock();
            }
            if(roomCode) initNet(roomCode);
            initGame();
        }

        function initNet(room) {
            const myId = "bm-" + room + "-" + Math.floor(Math.random()*999);
            peer = new Peer(myId);
            peer.on('open', () => {
                const c = peer.connect("bm-" + room);
                if(c) setupConn(c);
            });
            peer.on('connection', setupConn);
        }

        function setupConn(c) {
            conn = c;
            conn.on('data', data => {
                if(data.type === 'move') updateRemote(data.id, data.pos);
            });
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444422, 1));
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color: 0x5cb85c}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            camera.position.set(0, 2, 5);
            loop();
        }

        // Joystick
        const joy = document.getElementById('mobile-ui');
        const stick = document.getElementById('stick');
        joy.addEventListener('touchmove', e => {
            const r = joy.getBoundingClientRect();
            moveX = (e.touches[0].clientX - (r.left + 60)) / 40;
            moveZ = (e.touches[0].clientY - (r.top + 60)) / 40;
            stick.style.transform = `translate(${moveX*15}px, ${moveZ*15}px)`;
        });
        joy.addEventListener('touchend', () => { moveX=0; moveZ=0; stick.style.transform='none'; });
        function doJump() { if(vY === 0) vY = 0.2; }

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        window.onmousemove = e => {
            if(document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        };

        function loop() {
            requestAnimationFrame(loop);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            
            let dx = moveX, dz = moveZ;
            if(!isMobile) {
                if(keys['KeyW']) dz = -0.15; if(keys['KeyS']) dz = 0.15;
                if(keys['KeyA']) dx = -0.15; if(keys['KeyD']) dx = 0.15;
            }

            const vec = new THREE.Vector3(dx, 0, dz).applyQuaternion(camera.quaternion);
            vec.y = 0;
            camera.position.add(vec);

            if(mode === 'survival') {
                vY -= 0.01; camera.position.y += vY;
                if(camera.position.y < 2) { camera.position.y = 2; vY = 0; if(keys['Space']) vY = 0.2; }
            } else {
                if(keys['Space']) camera.position.y += 0.1;
                if(keys['ShiftLeft']) camera.position.y -= 0.1;
            }

            if(conn && conn.open) conn.send({type:'move', id: peer.id, pos: camera.position});
            renderer.render(scene, camera);
        }

        document.addEventListener('pointerlockchange', () => {
            if(!isMobile && !document.pointerLockElement) document.getElementById('menu-container').style.display = 'flex';
        });
    </script>
</body>
</html>
