<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blocky Mines</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* MINECRAFT 1.5 AESTHETIC */
        body { margin: 0; overflow: hidden; background: #332211; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; touch-action: none; }
        
        #launcher {
            position: absolute; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'), linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5));
            background-color: #3d3d3d; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }

        .mc-logo { font-size: 60px; font-weight: 900; color: #DDD; text-shadow: 5px 5px #000; letter-spacing: 2px; margin-bottom: 10px; }
        .splash { color: #FFFF00; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; transform: rotate(-15deg); animation: pulse 0.6s infinite alternate; margin-bottom: 40px; }
        @keyframes pulse { from { transform: rotate(-15deg) scale(1); } to { transform: rotate(-15deg) scale(1.15); } }

        .mc-button {
            width: 320px; padding: 12px; background: #666; border: 2px solid #000;
            color: #EEE; font-size: 18px; cursor: pointer; margin: 6px;
            box-shadow: inset -3px -3px #333, inset 3px 3px #AAA;
        }
        .mc-button:hover { background: #7a7a7a; border-color: #fff; }

        /* HUD & GAME UI */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border-top: 2px solid white; border-left: 2px solid white; transform: translate(-50%, -50%); opacity: 0.8; }
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 200px; height: 40px; background: rgba(0,0,0,0.6); border: 2px solid #888; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* MOBILE OVERLAY */
        #mobile-controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100; }
        .joystick-base { width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.3); }
        #stick { width: 40px; height: 40px; background: #fff; border-radius: 50%; position: absolute; left: 35px; top: 35px; }
        .action-btns { display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>

    <div id="launcher">
        <div class="mc-logo">BLOCKY MINES</div>
        <div class="splash">Version 1.5 Released!</div>
        
        <button class="mc-button" onclick="initGame('pc')">Start PC Game</button>
        <button class="mc-button" onclick="initGame('mobile')">Start Mobile Game</button>
        <button class="mc-button" style="opacity:0.5">Multiplayer (Coming Soon)</button>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="hotbar">GRASS BLOCK</div>
    </div>

    <div id="mobile-controls">
        <div class="joystick-base" id="joyBase"><div id="stick">
