<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLOCKY MINES RESET</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #overlay { position: absolute; top: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 100; color: white; text-align: center; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
        .btn { padding: 15px 30px; background: #5cb85c; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">WASD to Move | Click to Start</div>

    <div id="overlay" onclick="start()">
        <div>
            <h1>BLOCKY MINES</h1>
            <button class="btn">CLICK TO PLAY</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controlsActive = false;
        let move = { f: 0, b: 0, l: 0, r: 0 };
        let yaw = 0, pitch = 0;

        function start() {
            document.getElementById('overlay').style.display = 'none';
            renderer.domElement.requestPointerLock();
            controlsActive = true;
        }

        // Initialize Scene
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights & Floor
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444422, 1));
        const floor = new THREE.Mesh(
            new THREE.BoxGeometry(50, 1, 50), 
            new THREE.MeshStandardMaterial({ color: 0x5cb85c })
        );
        floor.position.y = -0.5;
        scene.add(floor);

        // Add a "Test Block" so you can see movement
        const box = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0xff0000}));
        box.position.set(0, 0.5, -5);
        scene.add(box);

        camera.position.set(0, 1.6, 5);

        // Input Handling
        window.onkeydown = (e) => {
            if(e.code === 'KeyW') move.f = 1; if(e.code === 'KeyS') move.b = 1;
            if(e.code === 'KeyA') move.l = 1; if(e.code === 'KeyD') move.r = 1;
        };
        window.onkeyup = (e) => {
            if(e.code === 'KeyW') move.f = 0; if(e.code === 'KeyS') move.b = 0;
            if(e.code === 'KeyA') move.l = 0; if(e.code === 'KeyD') move.r = 0;
        };
        window.onmousemove = (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(move.r - move.l, 0, move.b - move.f);
                dir.applyQuaternion(camera.quaternion);
                dir.y = 0;
                camera.position.add(dir.normalize().multiplyScalar(0.1));
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
