<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blocky Mines 10.1 - High Performance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        .menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; background: rgba(0,0,0,0.85); color: white; text-align: center; }
        .window { background: #c6c6c6; border: 4px solid #000; padding: 25px; width: 340px; color: #333; box-shadow: inset -4px -4px #555, inset 4px 4px #fff; }
        .mc-btn { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #000; background: #666; color: white; font-weight: bold; cursor: pointer; box-shadow: inset -3px -3px #333, inset 3px 3px #AAA; }
        .mc-btn:hover { background: #777; }
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 1000; }
        .hotbar { display: flex; background: rgba(0,0,0,0.6); border: 4px solid #888; padding: 4px; gap: 4px; }
        .slot { width: 48px; height: 48px; border: 4px solid #444; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; background: rgba(255,255,255,0.1); }
        .active { border-color: #fff; background: rgba(255,255,255,0.3); }
        #stats { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); display: none; }
        .heart { width: 14px; height: 14px; background: #ff2d2d; border: 1px solid #000; display: inline-block; margin: 1px; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: none; }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; left: 30px; top: 30px; }
        #jump-btn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; }
    </style>
</head>
<body>

    <div id="main-menu" class="menu">
        <div class="window">
            <h1 style="margin-top:0">BLOCKY MINES 10.1</h1>
            <input type="text" id="room" placeholder="ROOM CODE" style="width:90%; padding:10px; margin-bottom:10px; text-align:center;">
            <button class="mc-btn" onclick="start('survival', 'pc')">SURVIVAL (PC)</button>
            <button class="mc-btn" onclick="start('survival', 'mobile')">SURVIVAL (MOBILE)</button>
            <button class="mc-btn" style="background:#444" onclick="start('limitless', 'pc')">LIMITLESS (PC)</button>
            <button class="mc-btn" style="background:#444" onclick="start('limitless', 'mobile')">LIMITLESS (MOBILE)</button>
        </div>
    </div>

    <div id="stats"></div>
    <div id="crosshair"></div>
    <div id="hud"><div class="hotbar" id="hb"></div></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="jump-btn">JUMP</div>

    <script>
        /**
         * ENGINE CORE - PERFORMANCE OPTIMIZED
         */
        let scene, camera, renderer, raycaster, clock;
        let isPaused = true, isSurvival = true, isMobile = false;
        let health = 20, selected = 0, vY = 0, yaw = 0, pitch = 0, moveX = 0, moveZ = 0;
        
        // World Objects
        let blocks = [], mobs = [], instancedMeshes = {};
        const WORLD_SIZE = 50; // 100x100 total
        const inventory = { "Grass": 64, "Stone": 64, "Wood": 64, "Leaves": 64, "Diamond": 10 };
        const hotbar = ["Grass", "Stone", "Wood", "Leaves", "Diamond"];

        function start(mode, plat) {
            isSurvival = mode === 'survival';
            isMobile = plat === 'mobile';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            if(isSurvival) document.getElementById('stats').style.display = 'block';
            if(isMobile) {
                document.getElementById('joy-base').style.display = 'block';
                document.getElementById('jump-btn').style.display = 'flex';
            }
            init();
        }

        function createTex(color) {
            const canv = document.createElement('canvas'); canv.width = 16; canv.height = 16;
            const ctx = canv.getContext('2d'); ctx.fillStyle = color; ctx.fillRect(0,0,16,16);
            for(let i=0; i<4; i++) { ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(Math.random()*16, Math.random()*16, 2, 2); }
            const t = new THREE.CanvasTexture(canv); t.magFilter = THREE.NearestFilter; return t;
        }

        const mats = {
            "Grass": new THREE.MeshLambertMaterial({map: createTex('#5da345')}),
            "Dirt": new THREE.MeshLambertMaterial({map: createTex('#7a5b40')}),
            "Stone": new THREE.MeshLambertMaterial({map: createTex('#808080')}),
            "Wood": new THREE.MeshLambertMaterial({map: createTex('#5c4033')}),
            "Leaves": new THREE.MeshLambertMaterial({map: createTex('#3a5e2c'), transparent:true, opacity:0.9}),
            "Diamond": new THREE.MeshLambertMaterial({map: createTex('#5decf5')}),
            "Bedrock": new THREE.MeshLambertMaterial({map: createTex('#222')}),
            "Mob": new THREE.MeshLambertMaterial({color: 0xff4444})
        };

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 500);
            renderer = new THREE.WebGLRenderer({antialias: false, powerPreference: "high-performance"});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(10, 20, 10); scene.add(sun);
            
            clock = new THREE.Clock(); raycaster = new THREE.Raycaster();
            generateWorld();
            setupControls();
            updateUI();
            isPaused = false;
            animate();
        }

        /**
         * BLOCK HANDLING
         */
        function addBlock(x, y, z, type) {
            const geo = new THREE.BoxGeometry(2,2,2);
            const b = new THREE.Mesh(geo, mats[type]);
            b.position.set(x, y, z); b.name = type;
            scene.add(b); blocks.push(b);
        }

        function generateWorld() {
            for(let x = -WORLD_SIZE; x < WORLD_SIZE; x += 2) {
                for(let z = -WORLD_SIZE; z < WORLD_SIZE; z += 2) {
                    addBlock(x, 0, z, "Grass");
                    for(let y = -2; y > -6; y -= 2) addBlock(x, y, z, "Dirt");
                    if(Math.random() < 0.01) spawnTree(x, 2, z);
                }
            }
            // Spawn limited mobs for performance
            for(let i=0; i<8; i++) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.5), mats.Mob);
                m.position.set(Math.random()*40-20, 4, Math.random()*40-20);
                scene.add(m); mobs.push(m);
            }
            camera.position.set(0, 8, 0);
        }

        function spawnTree(x, y, z) {
            for(let i=0; i<3; i++) addBlock(x, y+(i*2), z, "Wood");
            for(let ox=-2; ox<=2; ox+=2) for(let oz=-2; oz<=2; oz+=2) addBlock(x+ox, y+6, z+oz, "Leaves");
        }

        /**
         * INTERACTION ENGINE
         */
        function interact(isPlace) {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(blocks);
            if(hits.length > 0) {
                const h = hits[0], item = hotbar[selected];
                if(isPlace && inventory[item] > 0) {
                    const p = h.object.position.clone().add(h.face.normal.multiplyScalar(2));
                    addBlock(p.x, p.y, p.z, item); if(inventory[item] !== Infinity) inventory[item]--;
                } else if(!isPlace && h.object.name !== "Bedrock") {
                    if(inventory[h.object.name] !== Infinity) inventory[h.object.name]++;
                    scene.remove(h.object); blocks.splice(blocks.indexOf(h.object), 1);
                }
                updateUI();
            }
        }

        /**
         * CONTROLS - RE-WRITTEN FOR ZERO LAG
         */
        function setupControls() {
            // PC
            window.addEventListener('keydown', e => {
                if(e.code === 'KeyW') moveZ = -0.15; if(e.code === 'KeyS') moveZ = 0.15;
                if(e.code === 'KeyA') moveX = -0.15; if(e.code === 'KeyD') moveX = 0.15;
                if(e.code === 'Space' && vY === 0) vY = 0.2;
                if(e.key >= 1 && e.key <= 5) { selected = e.key-1; updateUI(); }
            });
            window.addEventListener('keyup', e => {
                if(['KeyW','KeyS'].includes(e.code)) moveZ = 0;
                if(['KeyA','KeyD'].includes(e.code)) moveX = 0;
            });
            window.addEventListener('mousemove', e => {
                if(document.pointerLockElement) {
                    yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
            });
            window.addEventListener('mousedown', e => { if(!isMobile) interact(e.button !== 0); });

            // MOBILE
            let jId = null, rx, ry, timer;
            window.addEventListener('touchstart', e => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2 && jId === null) jId = t.identifier;
                    else if(t.clientX >= window.innerWidth/2) {
                        rx = t.clientX; ry = t.clientY;
                        timer = setTimeout(() => interact(false), 500); // LONG PRESS BREAK
                    }
                }
            });
            window.addEventListener('touchmove', e => {
                for(let t of e.touches) {
                    if(t.identifier === jId) {
                        const b = document.getElementById('joy-base').getBoundingClientRect();
                        let dx = t.clientX - (b.left + 50), dy = t.clientY - (b.top + 50);
                        const d = Math.sqrt(dx*dx+dy*dy); if(d>40) {dx*=40/d; dy*=40/d;}
                        document.getElementById('joy-stick').style.transform = `translate(${dx}px, ${dy}px)`;
                        moveX = (dx/40)*0.15; moveZ = (dy/40)*0.15;
                    } else if(t.clientX > window.innerWidth/2) {
                        yaw -= (t.clientX - rx) * 0.007; pitch -= (t.clientY - ry) * 0.007;
                        rx = t.clientX; ry = t.clientY; clearTimeout(timer);
                    }
                }
            });
            window.addEventListener('touchend', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === jId) { jId=null; moveX=0; moveZ=0; document.getElementById('joy-stick').style.transform='none'; }
                    else if(t.clientX >= window.innerWidth/2) {
                        if(Date.now() - (timer?._startTime || 0) < 500) interact(true); // TAP PLACE
                        clearTimeout(timer);
                    }
                }
            });
            document.getElementById('jump-btn').onclick = () => { if(vY===0) vY=0.2; };
            renderer.domElement.onclick = () => { if(!isMobile) renderer.domElement.requestPointerLock(); };
        }

        /**
         * GAME LOOP
         */
        function animate() {
            requestAnimationFrame(animate); if(isPaused) return;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            const v = new THREE.Vector3(moveX, 0, moveZ).applyQuaternion(camera.quaternion);
            v.y = 0; camera.position.add(v);
            
            vY -= 0.01; camera.position.y += vY;
            if(camera.position.y < 4) { camera.position.y = 4; vY = 0; }
            
            mobs.forEach(m => {
                m.position.x += Math.sin(Date.now()*0.001) * 0.02;
                if(isSurvival && m.position.distanceTo(camera.position) < 4) health -= 0.05;
            });

            if(isSurvival && health <= 0) location.reload();
            renderer.render(scene, camera);
        }

        function updateUI() {
            const h = document.getElementById('hb'); h.innerHTML = '';
            hotbar.forEach((k, i) => h.innerHTML += `<div class="slot ${i===selected?'active':''}">${k[0]}<br>${inventory[k]===Infinity?'∞':inventory[k]}</div>`);
            if(isSurvival) {
                const s = document.getElementById('stats'); s.innerHTML = '';
                for(let i=0; i<Math.floor(health); i++) s.innerHTML += `<div class="heart"></div>`;
            }
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
