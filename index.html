<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blocky Mines 1.5 - Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #332211; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #launcher {
            position: absolute; width: 100%; height: 100%;
            background-color: #2c2c2c; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 2000;
        }

        .mc-logo { font-size: 50px; font-weight: 900; text-shadow: 4px 4px #000; margin-bottom: 20px; }
        
        .mc-button {
            width: 280px; padding: 15px; background: #666; border: 3px solid #000;
            color: #EEE; font-size: 18px; cursor: pointer; margin: 8px;
            box-shadow: inset -4px -4px #333, inset 4px 4px #AAA;
            display: block; text-align: center;
        }
        .mc-button:active { background: #444; box-shadow: inset 4px 4px #333; }

        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border-top: 2px solid white; border-left: 2px solid white; transform: translate(-50%, -50%); }

        #mobile-ui { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; }
        .joy-base { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid #fff; }
        #stick { width: 40px; height: 40px; background: #fff; border-radius: 50%; position: relative; left: 30px; top: 30px; }
    </style>
</head>
<body>

    <div id="launcher">
        <div class="mc-logo">BLOCKY MINES</div>
        <button class="mc-button" id="pc-btn">START PC MODE</button>
        <button class="mc-button" id="mb-btn" style="background:#555">START MOBILE MODE</button>
    </div>

    <div id="hud"><div id="crosshair"></div></div>

    <div id="mobile-ui">
        <div class="joy-base" id="joy"><div id="stick"></div></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="mc-button" style="width:100px" id="place-btn">BUILD</button>
            <button class="mc-button" style="width:100px; background:#844" id="break-btn">BREAK</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, raycaster;
        let blocks = [], isMobile = false, keys = {};
        let moveX = 0, moveZ = 0, yaw = 0, pitch = 0, vY = 0;

        // FORCE BUTTON LISTENERS
        document.getElementById('pc-btn').addEventListener('click', () => start('pc'));
        document.getElementById('mb-btn').addEventListener('click', () => start('mobile'));

        function start(type) {
            isMobile = (type === 'mobile');
            document.getElementById('launcher').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            if(isMobile) {
                document.getElementById('mobile-ui').style.display = 'flex';
            } else {
                // PC lock needs to be triggered by a direct click
                document.body.requestPointerLock();
            }
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            raycaster = new THREE.Raycaster();
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444422, 1));

            // Generate Terrain
            for(let x = -8; x <= 8; x++) {
                for(let z = -8; z <= 8; z++) {
                    let h = Math.round(Math.sin(x/3) * Math.cos(z/3) * 2) + 2;
                    for(let y = 0; y <= h; y++) {
                        const b = new THREE.Mesh(
                            new THREE.BoxGeometry(1,1,1), 
                            new THREE.MeshStandardMaterial({color: (y===h)?0x5cb85c:0x808080})
                        );
                        b.position.set(x, y, z);
                        scene.add(b);
                        blocks.push(b);
                    }
                }
            }
            camera.position.set(0, 10, 5);
            animate();
        }

        function doAction(type) {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(blocks);
            if(hits.length > 0) {
                const hit = hits[0];
                if(type === 'break') {
                    if(hit.object.position.y !== 0) {
                        scene.remove(hit.object);
                        blocks.splice(blocks.indexOf(hit.object), 1);
                    }
                } else {
                    const p = hit.object.position.clone().add(hit.face.normal);
                    const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: 0x999999}));
                    b.position.copy(p);
                    scene.add(b);
                    blocks.push(b);
                }
            }
        }

        // INPUTS
        window.onmousedown = (e) => { if(document.pointerLockElement) doAction(e.button === 0 ? 'break' : 'place'); };
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;
        window.onmousemove = (e) => {
            if(document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        };

        // Mobile Buttons
        document.getElementById('place-btn').onpointerdown = () => doAction('place');
        document.getElementById('break-btn').onpointerdown = () => doAction('break');

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            
            let dx = moveX, dz = moveZ;
            if(!isMobile) {
                if(keys['KeyW']) dz = -0.12; if(keys['KeyS']) dz = 0.12;
                if(keys['KeyA']) dx = -0.12; if(keys['KeyD']) dx = 0.12;
            }

            const vec = new THREE.Vector3(dx, 0, dz).applyQuaternion(camera.quaternion);
            vec.y = 0;
            camera.position.add(vec);
            
            // Basic Floor Stay
            if(camera.position.y < 5) camera.position.y = 5;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
