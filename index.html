<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLOCKY MINES - Live Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #5cb85c; --bg-glass: rgba(20, 20, 20, 0.9); --border: rgba(255,255,255,0.2); }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        
        /* UI LAYERS */
        #hud { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; color: white; }
        #stats { position: absolute; top: 20px; left: 20px; background: var(--bg-glass); padding: 15px; border-radius: 12px; border: 1px solid var(--border); backdrop-filter: blur(5px); }
        #chat { position: absolute; bottom: 120px; left: 20px; width: 250px; height: 120px; background: rgba(0,0,0,0.4); padding: 10px; font-size: 12px; overflow: hidden; border-radius: 8px; display: flex; flex-direction: column-reverse; }
        
        /* MENU */
        #overlay { position: absolute; top: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(10px); }
        .menu-card { background: #1a1a1a; padding: 40px; border-radius: 20px; text-align: center; color: white; border: 1px solid var(--border); width: 350px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; }
        .btn { background: var(--primary); border: none; color: white; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; }
        .hidden { display: none !important; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); mix-blend-mode: difference; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div id="stats">
            <div style="color:#f0ad4e">LIVE MULTIPLAYER</div>
            <div>My ID: <span id="my-id">Connecting...</span></div>
            <div>Players: <span id="p-count">1</span></div>
        </div>
        <div id="chat"><div id="chat-inner"></div></div>
        <div id="crosshair"></div>
    </div>

    <div id="overlay">
        <div class="menu-card">
            <h1>BLOCKY MINES</h1>
            <p>Share your ID to host, or enter an ID to join.</p>
            <input type="text" id="join-id-input" placeholder="Paste Friend ID Here">
            <button class="btn" id="joinBtn">JOIN SERVER</button>
            <hr style="margin:20px; opacity:0.2">
            <button class="btn" id="hostBtn" style="background:#444">START AS HOST</button>
        </div>
    </div>

    <script>
        // --- GAME ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444422, 0.8));

        // World
        const blocks = [];
        const remotePlayers = {}; // Store other players' meshes
        const mat = new THREE.MeshStandardMaterial({ color: 0x3a9d23 });
        for(let x=-10; x<10; x++) {
            for(let z=-10; z<10; z++) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
                b.position.set(x, 0, z); scene.add(b); blocks.push(b);
            }
        }

        // --- NETWORKING (PEERJS) ---
        const peer = new Peer(); 
        let conn;

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            console.log("My Peer ID: " + id);
        });

        // When someone connects TO YOU (You are the Host)
        peer.on('connection', (connection) => {
            conn = connection;
            setupDataListener();
            addChatMessage("A player connected!");
        });

        // JOINING a host
        document.getElementById('joinBtn').onclick = () => {
            const id = document.getElementById('join-id-input').value;
            if(id) {
                conn = peer.connect(id);
                setupDataListener();
                startPlaying();
            }
        };

        document.getElementById('hostBtn').onclick = () => startPlaying();

        function setupDataListener() {
            conn.on('data', (data) => {
                if(data.type === 'pos') {
                    updateRemotePlayer(data.id, data.pos);
                }
            });
        }

        function updateRemotePlayer(id, pos) {
            if(!remotePlayers[id]) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), new THREE.MeshStandardMaterial({color: 0x3498db}));
                scene.add(mesh);
                remotePlayers[id] = mesh;
                addChatMessage("New player visible.");
            }
            remotePlayers[id].position.set(pos.x, pos.y, pos.z);
        }

        function addChatMessage(m) {
            const msg = document.createElement('div');
            msg.innerText = "[Net] " + m;
            document.getElementById('chat-inner').appendChild(msg);
        }

        function startPlaying() {
            renderer.domElement.requestPointerLock();
            document.getElementById('overlay').classList.add('hidden');
        }

        // --- LOOP & MOVEMENT ---
        camera.position.set(0, 3, 5);
        let yaw = 0, pitch = 0, keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const move = new THREE.Vector3();
                if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
                if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
                move.applyQuaternion(camera.quaternion); move.y = 0;
                camera.position.add(move.normalize().multiplyScalar(0.1));

                // SEND POSITION TO PEER
                if(conn && conn.open) {
                    conn.send({
                        type: 'pos',
                        id: peer.id,
                        pos: { x: camera.position.x, y: camera.position.y - 1.5, z: camera.position.z }
                    });
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
