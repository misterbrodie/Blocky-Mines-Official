<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLOCKY MINES 1.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZpZzBqM3B0bmZpZzBqM3B0bmZpZzBqM3B0bmZpZzBqM3B0JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/mYfU3M0e7kU0/giphy.gif">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gui: #c6c6c6; --btn: #666; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; image-rendering: pixelated; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .window { background: var(--gui); border: 4px solid #000; padding: 20px; width: 320px; color: #333; text-align: center; }
        .mc-btn { width: 100%; padding: 12px; margin: 8px 0; border: 3px solid #000; background: var(--btn); color: #fff; font-weight: bold; cursor: pointer; }
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 500; }
        .hotbar { display: flex; background: rgba(0,0,0,0.8); border: 4px solid #555; padding: 4px; gap: 4px; }
        .slot { width: 40px; height: 40px; border: 4px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.3); }
        #clock-ui { position: absolute; top: 15px; right: 25px; font-weight: bold; text-shadow: 2px 2px #000; color: #fff; }
        #stats { position: absolute; top: 45px; left: 25px; display: none; color: #fff; }
        .bar { width: 120px; height: 10px; border: 2px solid #000; background: #222; }
        #hp-fill { height: 100%; background: #f22; width: 100%; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 18px; height: 18px; border: 2px solid #fff; transform: translate(-50%, -50%); mix-blend-mode: difference; display: none; }
    </style>
</head>
<body>
    <div id="m-os" class="overlay"><div class="window"><h1>BLOCKY MINES</h1><button class="mc-btn" onclick="setup(false)">PC</button><button class="mc-btn" onclick="setup(true)">MOBILE</button></div></div>
    <div id="m-mode" class="overlay" style="display:none"><div class="window"><h2>MODE</h2><button class="mc-btn" onclick="start('Survival')">SURVIVAL</button><button class="mc-btn" onclick="start('Limitless')">LIMITLESS</button></div></div>
    <div id="clock-ui">DAY 6:00</div><div id="crosshair"></div>
    <div id="stats">HP <div class="bar"><div id="hp-fill"></div></div></div>
    <div id="hud"><div class="hotbar" id="hb"></div></div>
    <script>
        let scene, camera, renderer, clock, isMobile, gameMode, isPaused = false;
        let vY = 0, yaw = 0, pitch = 0, moveZ = 0, moveX = 0, slot = 0, hp = 100, gameTime = 0;
        let blocks = [], entities = [], ray = new THREE.Raycaster(), mats = {};
        const ITEMS = ["Grass", "Stone", "Wood", "Leaves", "Glass", "TNT", "Table", "Cranberry"];
        const COLOR = { Grass:0x5da345, Stone:0x808080, Wood:0x5c4033, Leaves:0x3a5e2c, Glass:0xadd8e6, TNT:0xff0000, Table:0x8b4513, Cranberry:0xff4444, Zombie:0x2e4d23 };

        function setup(m) { isMobile = m; document.getElementById('m-os').style.display='none'; document.getElementById('m-mode').style.display='flex'; }
        function start(m) { 
            gameMode = m; document.getElementById('m-mode').style.display='none'; 
            document.getElementById('hud').style.display='block'; if(gameMode==='Survival') document.getElementById('stats').style.display='block';
            if(!isMobile) document.getElementById('crosshair').style.display='block';
            for(let k in COLOR) mats[k] = new THREE.MeshLambertMaterial({map: tex(COLOR[k])});
            init(); 
        }

        function tex(c) {
            const cv = document.createElement('canvas'); cv.width = 16; cv.height = 16; const cx = cv.getContext('2d');
            cx.fillStyle = '#'+c.toString(16).padStart(6,'0'); cx.fillRect(0,0,16,16);
            for(let i=0;i<30;i++){ cx.fillStyle=`rgba(0,0,0,${Math.random()*0.2})`; cx.fillRect(Math.random()*16,Math.random()*16,1,1); }
            const t = new THREE.CanvasTexture(cv); t.magFilter = t.minFilter = THREE.NearestFilter; return t;
        }

        function init() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1500);
            renderer = new THREE.WebGLRenderer({antialias:false}); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement); scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1)); clock = new THREE.Clock();

            // 1000x1000 World with Border Walls
            for(let x=-50; x<=50; x+=2) {
                for(let z=-50; z<=50; z+=2) {
                    let h = Math.floor(Math.sin(x/10)*Math.cos(z/10)*4);
                    for(let y=-10; y<=h; y+=2) {
                        if(!(Math.random()>0.92 && y<0)) addB(x, y, z, y===h ? "Grass" : "Stone");
                    }
                    if(Math.random()<0.01) buildTree(x,h+2,z);
                    if(Math.random()<0.001) addB(x,h+1.2,z,"Cranberry");
                }
            }
            // THE END OF THE MAP: INFINITE STONE WALLS
            const wallGeo = new THREE.BoxGeometry(1002, 500, 2);
            const wallPositions = [[0, 240, 501], [0, 240, -501], [501, 240, 0], [-501, 240, 0]];
            wallPositions.forEach((pos, i) => {
                const w = new THREE.Mesh(wallGeo, mats.Stone);
                if(i > 1) w.rotation.y = Math.PI/2;
                w.position.set(...pos); scene.add(w);
            });

            camera.position.set(0, 15, 0); drawHB(); bind(); loop();
        }

        function addB(x,y,z,t) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), mats[t]);
            if(t==="Cranberry") b.scale.set(0.2,0.2,0.2);
            b.position.set(x,y,z); b.name = t; scene.add(b); blocks.push(b);
        }

        function buildTree(x,y,z) { 
            for(let i=0;i<3;i++) addB(x,y+(i*2),z,"Wood"); 
            addB(x,y+6,z,"Leaves"); addB(x+2,y+4,z,"Leaves"); addB(x-2,y+4,z,"Leaves");
        }

        function bind() {
            window.onkeydown = e => {
                if(e.code==='KeyW') moveZ=-0.4; if(e.code==='KeyS') moveZ=0.4; if(e.code==='KeyA') moveX=-0.4; if(e.code==='KeyD') moveX=0.4;
                if(e.code==='Space') { if(gameMode==='Limitless') camera.position.y+=1.5; else if(vY===0) vY=0.3; }
                if(e.code.startsWith('Digit')) { slot=parseInt(e.code.slice(-1))-1; drawHB(); }
            };
            window.onkeyup = () => moveZ = moveX = 0;
            document.onmousedown = e => {
                if(isMobile) return; ray.setFromCamera(new THREE.Vector2(0,0), camera); const h = ray.intersectObjects(blocks);
                if(h.length>0) {
                    if(e.button===0) { scene.remove(h[0].object); blocks=blocks.filter(b=>b!==h[0].object); }
                    else { const p=h[0].object.position; const n=h[0].face.normal; addB(p.x+n.x*2, p.y+n.y*2, p.z+n.z*2, ITEMS[slot]); }
                }
            };
            if(!isMobile) document.body.onclick = () => document.body.requestPointerLock();
            document.onmousemove = e => { if(document.pointerLockElement) { yaw-=e.movementX*0.002; pitch-=e.movementY*0.002; }};
        }

        function drawHB() { 
            const h = document.getElementById('hb'); h.innerHTML = '';
            ITEMS.forEach((it, i) => h.innerHTML += `<div class="slot ${i===slot?'active':''}" onclick="slot=${i};drawHB()">${it[0]}</div>`);
        }

        function loop() {
            requestAnimationFrame(loop); const dt = clock.getDelta(); gameTime += dt;
            const cyc = gameTime % 660; const n = cyc > 360;
            document.getElementById('clock-ui').innerText = (n?"NIGHT ":"DAY ")+Math.floor((n?660-cyc:360-cyc)/60)+":"+Math.floor((n?660-cyc:360-cyc)%60).toString().padStart(2,'0');
            scene.background = new THREE.Color(n?0x050510:0x87CEEB);

            camera.rotation.set(pitch, yaw, 0, 'YXZ'); camera.translateZ(moveZ); camera.translateX(moveX);
            // Border Collision Logic
            camera.position.x = Math.max(-498, Math.min(498, camera.position.x));
            camera.position.z = Math.max(-498, Math.min(498, camera.position.z));

            if(gameMode==='Survival') { vY-=0.012; camera.position.y+=vY; if(camera.position.y<10) {camera.position.y=10; vY=0;} }
            
            if(n && Math.random()<0.02) {
                const z = new THREE.Mesh(new THREE.BoxGeometry(1.2,2.6,1.2), mats.Zombie);
                z.position.set(camera.position.x+(Math.random()-0.5)*50, 10, camera.position.z+(Math.random()-0.5)*50);
                scene.add(z); entities.push(z);
            }
            entities.forEach((z,i) => { 
                z.lookAt(camera.position.x, z.position.y, camera.position.z); z.translateZ(0.04);
                if(z.position.distanceTo(camera.position)<3 && gameMode==='Survival') hp-=0.6;
                if(!n) { scene.remove(z); entities.splice(i,1); }
            });
            if(gameMode==='Survival') { document.getElementById('hp-fill').style.width = hp+"%"; if(hp<=0) location.reload(); }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
