<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blocky Mines 1.5 - Alpha Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #launcher {
            position: absolute; width: 100%; height: 100%;
            background: #332211; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 2000;
        }
        .mc-button {
            width: 280px; padding: 15px; background: #666; border: 3px solid #000;
            color: #EEE; font-size: 18px; cursor: pointer; margin: 8px;
            box-shadow: inset -4px -4px #333, inset 4px 4px #AAA;
        }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border-top: 2px solid white; border-left: 2px solid white; transform: translate(-50%, -50%); }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px; background: rgba(0,0,0,0.5); border: 2px solid #fff; }
    </style>
</head>
<body>

    <div id="launcher">
        <h1 style="text-shadow: 3px 3px #000;">BLOCKY MINES <span style="color:#5cb85c">ALPHA</span></h1>
        <button class="mc-button" onclick="start()">ENTER WORLD</button>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="hotbar">HAND: GRASS</div>
    </div>

    <script>
        let scene, camera, renderer, raycaster, clock;
        let blocks = [], particles = [], keys = {};
        let yaw = 0, pitch = 0, vY = 0;

        function start() {
            document.getElementById('launcher').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.body.requestPointerLock();
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Pixelated look
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Enable shadows
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            // LIGHTING (Alpha Style)
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            const ambient = new THREE.AmbientLight(0x404040, 1.2); // Bright ambient like Alpha
            scene.add(ambient);

            // Generate Terrain
            for(let x = -8; x <= 8; x++) {
                for(let z = -8; z <= 8; z++) {
                    let h = Math.round(Math.sin(x/4) * Math.cos(z/4) * 2) + 2;
                    for(let y = 0; y <= h; y++) {
                        addBlock(x, y, z, y === h ? 0x5cb85c : 0x795548);
                    }
                }
            }

            camera.position.set(0, 8, 5);
            animate();
        }

        function addBlock(x, y, z, color) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const b = new THREE.Mesh(geo, mat);
            b.position.set(x, y, z);
            b.receiveShadow = true;
            b.castShadow = true;
            scene.add(b);
            blocks.push(b);
        }

        function breakBlock(block) {
            // Particle Effect
            for(let i=0; i<6; i++) {
                const pGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const pMat = new THREE.MeshBasicMaterial({ color: block.material.color });
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.copy(block.position);
                p.velocity = new THREE.Vector3((Math.random()-0.5)*0.1, 0.2, (Math.random()-0.5)*0.1);
                scene.add(p);
                particles.push(p);
            }
            scene.remove(block);
            blocks.splice(blocks.indexOf(block), 1);
        }

        function doAction(isPlace) {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(blocks);
            if(hits.length > 0) {
                const hit = hits[0];
                if(isPlace) {
                    const p = hit.object.position.clone().add(hit.face.normal);
                    addBlock(p.x, p.y, p.z, 0x808080);
                } else {
                    if(hit.object.position.y !== 0) breakBlock(hit.object);
                }
            }
        }

        // MOVEMENT ENGINE
        window.onmousedown = (e) => { if(document.pointerLockElement) doAction(e.button !== 0); };
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;
        window.onmousemove = (e) => {
            if(document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            
            let dx = 0, dz = 0;
            if(keys['KeyW']) dz = -0.15; if(keys['KeyS']) dz = 0.15;
            if(keys['KeyA']) dx = -0.15; if(keys['KeyD']) dx = 0.15;

            const move = new THREE.Vector3(dx, 0, dz).applyQuaternion(camera.quaternion);
            move.y = 0;
            camera.position.add(move);

            // Gravity
            vY -= 0.01; camera.position.y += vY;
            if(camera.position.y < 5) { camera.position.y = 5; vY = 0; if(keys['Space']) vY = 0.2; }

            // Update Particles
            particles.forEach((p, i) => {
                p.position.add(p.velocity);
                p.velocity.y -= 0.01;
                p.scale.multiplyScalar(0.95);
                if(p.scale.x < 0.01) { scene.remove(p); particles.splice(i, 1); }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
