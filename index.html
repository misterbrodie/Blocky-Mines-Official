<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blocky Mines 8.1 - Swipe Controls</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        .overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); color: white; }
        .window { background: #c6c6c6; border: 4px solid #000; padding: 20px; text-align: center; box-shadow: inset -4px -4px #555, inset 4px 4px #fff; width: 320px; color: #333; }
        .mc-btn { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #000; background: #666; color: white; font-weight: bold; cursor: pointer; }
        
        /* HUD */
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 1000; }
        .hotbar { display: flex; background: rgba(0,0,0,0.7); border: 4px solid #888; padding: 4px; gap: 4px; }
        .slot { width: 44px; height: 44px; border: 4px solid #444; display: flex; align-items: center; justify-content: center; position: relative; color: white; font-size: 10px; }
        .active { border-color: #fff; box-shadow: 0 0 15px #fff; background: rgba(255,255,255,0.1); }
        
        #stats { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; width: 260px; }
        .heart { width: 12px; height: 12px; background: #ff2d2d; border: 1px solid #000; }
        .meat { width: 12px; height: 12px; background: #cd853f; border: 1px solid #000; }
        .empty { background: #333 !important; }

        /* Dynamic Joystick */
        #joy-zone { position: absolute; top: 0; left: 0; width: 50%; height: 100%; z-index: 2000; }
        #joy-base { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; pointer-events: none; }
        #joy-stick { position: absolute; width: 30px; height: 30px; background: white; border-radius: 50%; left: 25px; top: 25px; }

        #mobile-right { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 2000; }
        .act-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1 style="text-shadow: 4px 4px #000;">BLOCKY MINES 8.1</h1>
        <div class="window">
            <button class="mc-btn" onclick="boot(true)">SURVIVAL</button>
            <button class="mc-btn" onclick="boot(false)">LIMITLESS</button>
        </div>
    </div>

    <div id="stats">
        <div id="hp-bar" class="bar"></div>
        <div id="hg-bar" class="bar" style="margin-top:4px"></div>
    </div>

    <div id="hud">
        <div class="hotbar" id="hb"></div>
    </div>

    <div id="joy-zone">
        <div id="joy-base"><div id="joy-stick"></div></div>
    </div>

    <div id="mobile-right">
        <div class="act-btn" onpointerdown="action(true)">PLACE</div>
        <div class="act-btn" style="background:rgba(255,0,0,0.4)" onpointerdown="action(false)">BREAK</div>
        <div class="act-btn" onpointerdown="vY=0.18">JUMP</div>
    </div>

    <script>
        let scene, camera, renderer, raycaster, blocks = [], mobs = [];
        let isPaused = true, health = 15, hunger = 10, selected = 0, vY = 0, yaw = 0, pitch = 0, moveX = 0, moveZ = 0;
        const inventory = { "Grass": 0, "Dirt": 0, "Stone": 0, "Wood": 0, "Leaves": 0, "Apple": 5 };
        const hotbar = ["Grass", "Stone", "Wood", "Apple"];

        function createTex(c) {
            const canv = document.createElement('canvas'); canv.width = 16; canv.height = 16;
            const ctx = canv.getContext('2d'); ctx.fillStyle = c; ctx.fillRect(0,0,16,16);
            for(let i=0; i<8; i++) { ctx.fillStyle = `rgba(0,0,0,0.1)`; ctx.fillRect(Math.random()*16, Math.random()*16, 1, 1); }
            const t = new THREE.CanvasTexture(canv); t.magFilter = THREE.NearestFilter; return t;
        }

        const mats = {
            "Grass": new THREE.MeshStandardMaterial({map: createTex('#5cb85c')}),
            "Dirt": new THREE.MeshStandardMaterial({map: createTex('#795548')}),
            "Stone": new THREE.MeshStandardMaterial({map: createTex('#888888')}),
            "Wood": new THREE.MeshStandardMaterial({map: createTex('#5d4037')}),
            "Leaves": new THREE.MeshStandardMaterial({map: createTex('#2d5a27'), transparent: true, opacity: 0.8}),
            "Bedrock": new THREE.MeshStandardMaterial({map: createTex('#222222')}),
            "Mob": new THREE.MeshStandardMaterial({map: createTex('#2e7d32')})
        };

        function boot(surv) {
            if(!surv) { for(let k in inventory) inventory[k] = Infinity; hunger = Infinity; }
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('mobile-right').style.display = 'flex';
            init(); isPaused = false;
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(10, 20, 10); scene.add(sun);

            for(let x=-10; x<10; x++) {
                for(let z=-10; z<10; z++) {
                    addB(x, 0, z, "Grass");
                    for(let y=-1; y>-6; y--) addB(x, y, z, "Dirt");
                    for(let y=-6; y>-96; y--) if(Math.random()>0.05) addB(x, y, z, "Stone");
                    addB(x, -96, z, "Bedrock");
                }
            }
            camera.position.set(0, 5, 0); raycaster = new THREE.Raycaster();
            updateUI(); loop();
        }

        function addB(x, y, z, type) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mats[type]);
            b.position.set(x, y, z); b.name = type;
            scene.add(b); blocks.push(b);
        }

        function action(isPlace) {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const item = hotbar[selected];
            const hits = raycaster.intersectObjects(blocks);
            if(hits.length > 0) {
                const h = hits[0];
                if(isPlace && inventory[item] > 0) {
                    const p = h.object.position.clone().add(h.face.normal);
                    addB(p.x, p.y, p.z, item); if(inventory[item] !== Infinity) inventory[item]--;
                } else if(!isPlace && h.object.name !== "Bedrock") {
                    if(inventory[h.object.name] !== Infinity) inventory[h.object.name]++;
                    scene.remove(h.object); blocks.splice(blocks.indexOf(h.object), 1);
                }
                updateUI();
            }
        }

        function updateUI() {
            const hb = document.getElementById('hb'); hb.innerHTML = '';
            hotbar.forEach((item, i) => { hb.innerHTML += `<div class="slot ${i===selected?'active':''}" onclick="selected=${i}; updateUI();">${item[0]}<br>${inventory[item] === Infinity ? '∞' : inventory[item]}</div>`; });
            const hp = document.getElementById('hp-bar'); hp.innerHTML = '';
            for(let i=0; i<15; i++) hp.innerHTML += `<div class="heart ${i >= health ? 'empty' : ''}"></div>`;
        }

        function loop() {
            requestAnimationFrame(loop);
            if(isPaused) return;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            const vec = new THREE.Vector3(moveX*0.12, 0, moveZ*0.12).applyQuaternion(camera.quaternion);
            vec.y = 0; camera.position.add(vec);
            vY -= 0.008; camera.position.y += vY;
            if(camera.position.y < 2.5) { camera.position.y = 2.5; vY = 0; }
            renderer.render(scene, camera);
        }

        // SWIPE CONTROLS LOGIC
        const joyZone = document.getElementById('joy-zone');
        const joyBase = document.getElementById('joy-base');
        const joyStick = document.getElementById('joy-stick');
        let joyTouchId = null;

        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth / 2 && joyTouchId === null) {
                    joyTouchId = t.identifier;
                    joyBase.style.display = 'block';
                    joyBase.style.left = (t.clientX - 40) + 'px';
                    joyBase.style.top = (t.clientY - 40) + 'px';
                }
            }
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyTouchId) {
                    const bx = parseInt(joyBase.style.left) + 40;
                    const by = parseInt(joyBase.style.top) + 40;
                    let dx = t.clientX - bx; let dy = t.clientY - by;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > 40) { dx *= 40/dist; dy *= 40/dist; }
                    joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
                    moveX = dx/40; moveZ = dy/40;
                } else if(t.clientX > window.innerWidth / 2) {
                    // Right side swiping for camera
                    if(t.identifier !== joyTouchId) {
                        yaw -= e.touches[0].force ? 0 : (t.clientX - window.innerWidth*0.75) * 0.0001; // Simple look
                    }
                }
            }
        });

        // Better camera swipe for right side
        let rx, ry;
        window.addEventListener('touchstart', e => {
            if(e.touches[0].clientX > window.innerWidth/2) { rx=e.touches[0].clientX; ry=e.touches[0].clientY; }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.touches) {
                if(t.clientX > window.innerWidth/2 && t.identifier !== joyTouchId) {
                    yaw -= (t.clientX - rx) * 0.007; pitch -= (t.clientY - ry) * 0.007;
                    rx = t.clientX; ry = t.clientY;
                }
            }
        });

        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyTouchId) {
                    joyTouchId = null; joyBase.style.display = 'none';
                    moveX = 0; moveZ = 0;
                }
            }
        });
    </script>
</body>
</html>
