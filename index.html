<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blocky Mines 1.5 - Alpha</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; }
        
        /* FULL SCREEN OVERLAYS */
        .menu-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; background-image: url('https://minecraft.wiki/images/bg-dirt.png');
            background-repeat: repeat; background-size: 64px;
        }

        #pause-menu { background: rgba(0,0,0,0.5); background-image: none; display: none; }

        .mc-logo { font-size: 40px; font-weight: bold; text-shadow: 3px 3px #000; margin-bottom: 30px; text-align: center; }
        
        .mc-button {
            width: 300px; padding: 12px; background: #666; border: 2px solid #000;
            color: #EEE; font-size: 16px; cursor: pointer; margin: 5px;
            box-shadow: inset -3px -3px #333, inset 3px 3px #AAA;
            text-transform: uppercase;
        }
        .mc-button:hover { background: #7a7a7a; border-color: white; }

        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border-top: 2px solid white; border-left: 2px solid white; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="main-menu" class="menu-layer">
        <div class="mc-logo">BLOCKY MINES<br><span style="font-size:18px; color:#FFFF00;">Alpha 1.5</span></div>
        <button class="mc-button" onclick="startGame()">Start Game</button>
        <button class="mc-button" style="opacity:0.5">Options</button>
    </div>

    <div id="pause-menu" class="menu-layer">
        <div class="mc-logo">Game Paused</div>
        <button class="mc-button" onclick="resumeGame()">Back to Game</button>
        <button class="mc-button" onclick="location.reload()">Save and Quit</button>
    </div>

    <div id="hud"><div id="crosshair"></div></div>

    <script>
        let scene, camera, renderer, raycaster, sun, ambient;
        let blocks = [], keys = {}, particles = [];
        let yaw = 0, pitch = 0, vY = 0, time = 0;
        let isPaused = true;

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            isPaused = false;
            document.body.requestPointerLock();
            if (!scene) init();
        }

        function resumeGame() {
            document.getElementById('pause-menu').style.display = 'none';
            document.body.requestPointerLock();
            isPaused = false;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            // Alpha Lighting
            sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);
            ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            // Terrain Generation
            for(let x = -10; x <= 10; x++) {
                for(let z = -10; z <= 10; z++) {
                    let h = Math.round(Math.sin(x/4) * Math.cos(z/4) * 2) + 2;
                    for(let y = 0; y <= h; y++) {
                        addBlock(x, y, z, (y === h) ? 0x5cb85c : 0x795548);
                    }
                }
            }
            camera.position.set(0, 10, 5);
            animate();
        }

        function addBlock(x, y, z, color) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: color}));
            b.position.set(x, y, z);
            b.castShadow = true; b.receiveShadow = true;
            scene.add(b); blocks.push(b);
        }

        function doAction(isPlace) {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(blocks);
            if(hits.length > 0) {
                const hit = hits[0];
                if(isPlace) {
                    const p = hit.object.position.clone().add(hit.face.normal);
                    addBlock(p.x, p.y, p.z, 0x808080);
                } else {
                    if(hit.object.position.y !== 0) {
                        scene.remove(hit.object);
                        blocks.splice(blocks.indexOf(hit.object), 1);
                    }
                }
            }
        }

        // CONTROL HANDLERS
        window.onmousedown = (e) => { if(!isPaused) doAction(e.button !== 0); };
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;
        window.onmousemove = (e) => {
            if(!isPaused && document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        };

        // ESCAPE TO PAUSE
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === null && document.getElementById('main-menu').style.display === 'none') {
                isPaused = true;
                document.getElementById('pause-menu').style.display = 'flex';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(isPaused) return;

            // Day/Night Cycle
            time += 0.005;
            sun.position.x = Math.sin(time) * 20;
            sun.position.y = Math.cos(time) * 20;
            scene.background = new THREE.Color().setHSL(0.6, 0.5, Math.max(0.1, Math.cos(time)));

            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            
            let dx = 0, dz = 0;
            if(keys['KeyW']) dz = -0.12; if(keys['KeyS']) dz = 0.12;
            if(keys['KeyA']) dx = -0.12; if(keys['KeyD']) dx = 0.12;

            const move = new THREE.Vector3(dx, 0, dz).applyQuaternion(camera.quaternion);
            move.y = 0;
            camera.position.add(move);

            vY -= 0.008; camera.position.y += vY;
            if(camera.position.y < 5) { camera.position.y = 5; vY = 0; if(keys['Space']) vY = 0.15; }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
