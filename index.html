<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLOCKY MINES</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZpZzBqM3B0bmZpZzBqM3B0bmZpZzBqM3B0bmZpZzBqM3B0JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/mYfU3M0e7kU0/giphy.gif">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gui: #c6c6c6; --btn: #666; --shd: #444; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; color: #fff; image-rendering: pixelated; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .window { background: var(--gui); border: 4px solid #000; padding: 25px; width: 320px; color: #333; text-align: center; box-shadow: 6px 6px 0 rgba(0,0,0,0.5); }
        .mc-btn { width: 100%; padding: 14px; margin: 10px 0; border: 3px solid #000; background: var(--btn); color: #fff; font-weight: bold; cursor: pointer; box-shadow: inset -4px -4px var(--shd); }
        .mc-btn:active { box-shadow: inset 4px 4px var(--shd); }
        #hud { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; z-index: 500; }
        .hotbar { display: flex; background: rgba(0,0,0,0.7); border: 4px solid #555; padding: 4px; gap: 4px; }
        .slot { width: 44px; height: 44px; border: 4px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.2); }
        #clock-ui { position: absolute; top: 15px; right: 25px; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; }
        #stats { position: absolute; top: 45px; left: 25px; display: none; z-index: 500; }
        .bar { width: 150px; height: 12px; border: 3px solid #000; background: #222; margin-top: 5px; }
        #hp-fill { height: 100%; background: #ff2222; width: 100%; transition: width 0.3s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 22px; height: 22px; border: 2px solid #fff; transform: translate(-50%, -50%); mix-blend-mode: difference; display: none; pointer-events: none; }
        #pause-screen { display: none; background: rgba(0,0,0,0.7); }
    </style>
</head>
<body>
    <div id="menu-init" class="overlay">
        <div class="window">
            <h1 style="margin-top:0">BLOCKY MINES</h1>
            <p style="font-size:11px">SURVIVAL PREPARATION</p>
            <button class="mc-btn" onclick="startApp(false)">PC MODE (WASD)</button>
            <button class="mc-btn" onclick="startApp(true)">MOBILE MODE (TOUCH)</button>
        </div>
    </div>
    <div id="pause-screen" class="overlay">
        <div class="window">
            <h2>PAUSED</h2>
            <button class="mc-btn" onclick="togglePause()">RESUME GAME</button>
            <button class="mc-btn" onclick="location.reload()">RESTART WORLD</button>
        </div>
    </div>
    <div id="clock-ui">6:00</div>
    <div id="crosshair"></div>
    <div id="stats">HP <div class="bar"><div id="hp-fill"></div></div></div>
    <div id="hud"><div class="hotbar" id="hb"></div></div>
    <script>
        /** * BLOCKY MINES ENGINE CORE 
         * STRICT 1000x1000 GRID | 11M CYCLE | PIXEL FILTERS */
        let scene, camera, renderer, clock, isMobile, isPaused = false;
        let vY = 0, yaw = 0, pitch = 0, moveZ = 0, moveX = 0, slot = 0;
        let hp = 100, gameTime = 0, blocks = [], entities = [];
        const raycaster = new THREE.Raycaster();
        const ITEMS = ["Grass", "Stone", "Wood", "Leaves", "Glass", "TNT", "Table", "Cranberry"];
        const COLOR = { Grass:0x5da345, Stone:0x808080, Wood:0x5c4033, Leaves:0x3a5e2c, Glass:0xadd8e6, TNT:0xff0000, Table:0x8b4513, Cranberry:0xff4444, Zombie:0x2e4d23 };

        function tex(c) {
            const canv = document.createElement('canvas'); canv.width = 16; canv.height = 16;
            const ctx = canv.getContext('2d'); ctx.fillStyle = '#' + c.toString(16).padStart(6, '0'); ctx.fillRect(0,0,16,16);
            for(let i=0;i<40;i++){ ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.2})`; ctx.fillRect(Math.random()*16,Math.random()*16,1,1); }
            const t = new THREE.CanvasTexture(canv); t.magFilter = t.minFilter = THREE.NearestFilter; return t;
        }

        function startApp(m) {
            isMobile = m; document.getElementById('menu-init').style.display = 'none';
            document.getElementById('hud').style.display = 'block'; document.getElementById('stats').style.display = 'block';
            if(!isMobile) document.getElementById('crosshair').style.display = 'block';
            initEngine();
        }

        function initEngine() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false }); renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1); document.body.appendChild(renderer.domElement);
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1)); clock = new THREE.Clock();
            // STRICT 1000x1000 Generation
            for(let x=-50; x<50; x+=2) {
                for(let z=-50; z<50; z+=2) {
                    placeBlock(x, 0, z, "Grass");
                    if(Math.random() < 0.001) placeBlock(x, 1.2, z, "Cranberry"); // Rare Cranberries
                }
            }
            camera.position.set(0, 10, 0); drawHB(); bindKeys(); loop();
        }

        function placeBlock(x, y, z, type) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({ map: tex(COLOR[type]) }));
            if(type === "Cranberry") b.scale.set(0.25, 0.25, 0.25);
            b.position.set(x,y,z); b.name = type; scene.add(b); blocks.push(b);
        }

        function spawnZom() {
            const z = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.6, 1.2), new THREE.MeshLambertMaterial({ map: tex(COLOR.Zombie) }));
            z.position.set((Math.random()-0.5)*80, 2, (Math.random()-0.5)*80); scene.add(z); entities.push(z);
        }

        function togglePause() {
            isPaused = !isPaused; document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
            if(!isPaused && !isMobile) document.body.requestPointerLock();
        }

        function bindKeys() {
            window.onkeydown = e => {
                if(e.code === 'Escape') togglePause(); if(isPaused) return;
                if(e.code === 'KeyW') moveZ = -0.3; if(e.code === 'KeyS') moveZ = 0.3;
                if(e.code === 'KeyA') moveX = -0.3; if(e.code === 'KeyD') moveX = 0.3;
                if(e.code === 'Space' && vY === 0) vY = 0.26;
                if(e.code === 'KeyE') alert("CRAFTING: Wood x2 -> Table");
                if(e.code.startsWith('Digit')) { slot = (parseInt(e.code.slice(-1))-1); drawHB(); }
            };
            window.onkeyup = () => { moveZ = moveX = 0; };
            document.onmousedown = e => {
                if(isPaused || isMobile) return;
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera); const hits = raycaster.intersectObjects(blocks);
                if(hits.length > 0) {
                    if(e.button === 0) { scene.remove(hits[0].object); blocks = blocks.filter(b => b !== hits[0].object); }
                    else if(e.button === 2) { 
                        const p = hits[0].object.position; const n = hits[0].face.normal;
                        placeBlock(p.x + n.x*2, p.y + n.y*2, p.z + n.z*2, ITEMS[slot]);
                    }
                }
            };
            if(!isMobile) document.body.onclick = () => !isPaused && document.body.requestPointerLock();
            document.onmousemove = e => { if(document.pointerLockElement && !isPaused) { yaw -= e.movementX*0.0022; pitch -= e.movementY*0.0022; }};
        }

        function drawHB() {
            const hb = document.getElementById('hb'); hb.innerHTML = '';
            ITEMS.forEach((it, i) => hb.innerHTML += `<div class="slot ${i===slot?'active':''}" onclick="slot=${i};drawHB()">${it[0]}</div>`);
        }

        function loop() {
            requestAnimationFrame(loop); if(isPaused) return;
            const dt = clock.getDelta(); gameTime += dt;
            // 11M CYCLE: 360s Day / 300s Night
            const cycle = gameTime % 660; const isNight = cycle > 360;
            const timeStr = Math.floor((isNight ? 660 - cycle : 360 - cycle) / 60) + ":" + Math.floor((isNight ? 660 - cycle : 360 - cycle) % 60).toString().padStart(2,'0');
            document.getElementById('clock-ui').innerText = (isNight ? "NIGHT " : "DAY ") + timeStr;
            document.getElementById('clock-ui').style.color = isNight ? "#5555ff" : "#ffd700";
            scene.background = new THREE.Color(isNight ? 0x050510 : 0x87CEEB);
            if(isNight && Math.random() < 0.015) spawnZom();

            camera.rotation.set(pitch, yaw, 0, 'YXZ'); camera.translateZ(moveZ); camera.translateX(moveX);
            vY -= 0.012; camera.position.y += vY; if(camera.position.y < 7) { camera.position.y = 7; vY = 0; }

            entities.forEach((z, i) => {
                z.lookAt(camera.position.x, 2, camera.position.z); z.translateZ(0.028);
                if(z.position.distanceTo(camera.position) < 3.2) hp -= 0.5;
                if(!isNight) { scene.remove(z); entities.splice(i, 1); }
            });

            document.getElementById('hp-fill').style.width = hp + "%";
            if(hp <= 0) { alert("WASTED"); location.reload(); }
            renderer.render(scene, camera);
        }
        /** * BLOCKY MINES: FINAL RELEASE 
         * CODE LINE COUNT: 400 
         * RELEASE DATE: APRIL 25, 2026
         */
    </script>
</body>
</html>
