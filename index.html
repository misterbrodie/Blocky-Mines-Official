<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLOCKY MINES</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="https://media.craiyon.com/2026-04-24/7um_55hMSMieRKzNFaM-fA.webp">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gui: #c6c6c6; --btn: #666; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .window { background: var(--gui); border: 4px solid #000; padding: 20px; width: 300px; color: #333; text-align: center; }
        .version-tag { font-size: 12px; color: #555; margin-top: -10px; margin-bottom: 15px; }
        .mc-btn { width: 100%; padding: 12px; margin: 8px 0; border: 3px solid #000; background: var(--btn); color: #fff; font-weight: bold; cursor: pointer; }
        
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 500; }
        .hotbar-container { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.85); border: 4px solid #555; padding: 4px; }
        .slot { width: 42px; height: 42px; border: 4px solid #333; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #fff; position: relative; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.2); }
        .count { position: absolute; bottom: 2px; right: 2px; font-size: 10px; color: #0f0; }

        /* CHAT SYSTEM */
        #chat-box { position: absolute; top: 10px; left: 10px; width: 250px; height: 150px; background: rgba(0,0,0,0.4); display: none; flex-direction: column; z-index: 2000; pointer-events: none; }
        #chat-log { flex: 1; overflow-y: auto; padding: 5px; color: #fff; font-size: 12px; text-shadow: 1px 1px #000; display: flex; flex-direction: column-reverse; }
        #chat-input { background: rgba(0,0,0,0.8); border: 2px solid #555; color: #fff; padding: 5px; outline: none; pointer-events: auto; display: none; }
        .chat-msg { margin-bottom: 2px; }
        .chat-btn-mob { position: absolute; top: 15px; left: 15px; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 5px; display: none; align-items: center; justify-content: center; color: #fff; font-size: 20px; z-index: 2001; pointer-events: auto; }

        /* TOUCH CONTROLS */
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 1000; }
        #stick-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #stick-head { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #fff; border-radius: 50%; pointer-events: none; }
        #act-btn { position: absolute; bottom: 160px; right: 40px; width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 3px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
        #look-zone { position: absolute; top: 0; right: 0; width: 65%; height: 75%; pointer-events: auto; }

        #clock-ui { position: absolute; top: 15px; right: 25px; font-weight: bold; text-shadow: 2px 2px #000; color: #fff; }
        #stats { position: absolute; top: 45px; left: 25px; display: none; color: #fff; }
        .bar { width: 120px; height: 12px; border: 2px solid #000; background: #222; }
        #hp-fill { height: 100%; background: #f22; width: 100%; transition: 0.3s; }
        #cross { position: absolute; top: 50%; left: 50%; width: 20px; height: 2px; background: #fff; transform: translate(-50%, -50%); display: none; mix-blend-mode: difference; pointer-events: none;}
        #cross::after { content:''; position: absolute; top: 50%; left: 50%; width: 2px; height: 20px; background: #fff; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="m-os" class="overlay">
        <div class="window">
            <h1>BLOCKY MINES</h1>
            <div class="version-tag">v1.0.1</div>
            <button class="mc-btn" onclick="setup(false)">PC MODE</button>
            <button class="mc-btn" onclick="setup(true)">MOBILE MODE</button>
        </div>
    </div>
    
    <div id="m-mode" class="overlay" style="display:none">
        <div class="window">
            <h2>SELECT MODE</h2>
            <button class="mc-btn" onclick="start('Survival')">SURVIVAL</button>
            <button class="mc-btn" onclick="start('Limitless')">LIMITLESS</button>
        </div>
    </div>

    <div id="chat-box">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to send...">
    </div>
    <div id="chat-btn-mob" class="chat-btn-mob" onclick="toggleChat()">💬</div>
    
    <div id="mobile-ui">
        <div id="stick-base"><div id="stick-head"></div></div>
        <div id="look-zone"></div>
        <div id="act-btn" onpointerdown="doAction()">ACTION</div>
    </div>

    <div id="clock-ui">DAY</div><div id="cross"></div>
    <div id="stats">HEALTH <div class="bar"><div id="hp-fill"></div></div></div>
    <div id="hud"><div class="hotbar-container"><div id="hb" style="display:flex;gap:4px"></div><div onclick="clearInv()" style="color:#fff;padding:10px;cursor:pointer;font-weight:bold;">...</div></div></div>

    <script>
        let scene, camera, renderer, clock, sun, isMobile, gameMode, moveZ=0, moveX=0, vY=0, yaw=0, pitch=0, slot=0, hp=100, gameTime=0, chatOpen=false;
        let blocks=[], entities=[], ray=new THREE.Raycaster(), mats={};
        const ITEMS=["Grass","Stone","Wood","Leaves","Glass","TNT","Table","Cranberry"];
        const COLOR={Grass:0x5da345,Stone:0x808080,Wood:0x5c4033,Leaves:0x3a5e2c,Glass:0xadd8e6,TNT:0xff2222,Table:0x8b4513,Cranberry:0xff0000,Zombie:0x2e4d23};
        let inv = { Grass:0, Stone:0, Wood:0, Leaves:0, Glass:0, TNT:0, Table:0, Cranberry:0 };

        function setup(m) { isMobile=m; document.getElementById('m-os').style.display='none'; document.getElementById('m-mode').style.display='flex'; }
        function start(m) { 
            gameMode=m; document.getElementById('m-mode').style.display='none'; document.getElementById('hud').style.display='block';
            document.getElementById('chat-box').style.display='flex';
            if(isMobile) { 
                document.getElementById('mobile-ui').style.display='block'; 
                document.getElementById('chat-btn-mob').style.display='flex';
                initMobileControls(); 
            } else { document.getElementById('cross').style.display='block'; }
            if(gameMode==='Survival') document.getElementById('stats').style.display='block';
            else ITEMS.forEach(i => inv[i] = "∞");
            for(let k in COLOR) mats[k]=new THREE.MeshStandardMaterial({map:tex(COLOR[k]), roughness: 0.8});
            init(); 
            addMsg("Server", "Welcome to Blocky Mines v1.0.1!");
        }

        function addMsg(user, text) {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<strong>[${user}]</strong> ${text}`;
            log.prepend(div);
        }

        function toggleChat() {
            chatOpen = !chatOpen;
            const input = document.getElementById('chat-input');
            input.style.display = chatOpen ? 'block' : 'none';
            if(chatOpen) {
                input.focus();
                if(!isMobile) document.exitPointerLock();
            } else {
                if(!isMobile) document.body.requestPointerLock();
            }
        }

        document.getElementById('chat-input').addEventListener('keydown', e => {
            if(e.key === 'Enter' && e.target.value.trim() !== "") {
                addMsg("You", e.target.value);
                e.target.value = "";
                toggleChat();
            }
        });

        function tex(c) {
            const cv=document.createElement('canvas'); cv.width=16; cv.height=16; const cx=cv.getContext('2d');
            cx.fillStyle='#'+c.toString(16).padStart(6,'0'); cx.fillRect(0,0,16,16);
            for(let i=0;i<15;i++){ cx.fillStyle=`rgba(0,0,0,0.15)`; cx.fillRect(Math.random()*16,Math.random()*16,1,1); }
            const t=new THREE.CanvasTexture(cv); t.magFilter=t.minFilter=THREE.NearestFilter; return t;
        }

        function init() {
            scene=new THREE.Scene(); camera=new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer=new THREE.WebGLRenderer({antialias:false}); renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled=true; document.body.appendChild(renderer.domElement);
            scene.fog=new THREE.FogExp2(0x87CEEB, 0.015); sun=new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(50,100,50);
            sun.castShadow=true; scene.add(sun); scene.add(new THREE.AmbientLight(0xffffff, 0.4)); clock=new THREE.Clock();
            for(let x=-40;x<=40;x+=2) {
                for(let z=-40;z<=40;z+=2) {
                    let h=Math.floor(Math.sin(x/12)*Math.cos(z/12)*5);
                    for(let y=-8;y<=h;y+=2) { if(!(Math.random()>0.94&&y<0)) addB(x,y,z,y===h?"Grass":"Stone",y===h); }
                    if(Math.random()<0.01) buildTree(x,h+2,z);
                }
            }
            camera.position.set(0, 15, 0); drawHB(); bind(); loop();
        }

        function addB(x,y,z,t,s) {
            const b=new THREE.Mesh(new THREE.BoxGeometry(2,2,2),mats[t]);
            b.position.set(x,y,z); b.name=t; b.receiveShadow=true; if(s) b.castShadow=true;
            scene.add(b); blocks.push(b);
        }

        function buildTree(x,y,z) { for(let i=0;i<3;i++) addB(x,y+i*2,z,"Wood",true); addB(x,y+6,z,"Leaves",true); }

        function initMobileControls() {
            const base = document.getElementById('stick-base'), head = document.getElementById('stick-head'), lookZone = document.getElementById('look-zone');
            let moveId = null, lookId = null, lastX, lastY;
            base.addEventListener('touchstart', e => { moveId = e.changedTouches[0].identifier; }, {passive:false});
            lookZone.addEventListener('touchstart', e => { 
                lookId = e.changedTouches[0].identifier; 
                lastX = e.changedTouches[0].clientX; lastY = e.changedTouches[0].clientY; 
            }, {passive:false});
            window.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === moveId) {
                        const rect = base.getBoundingClientRect();
                        const dx = t.clientX - (rect.left + 50), dy = t.clientY - (rect.top + 50);
                        const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                        const angle = Math.atan2(dy, dx);
                        head.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                        moveX = (Math.cos(angle)*dist/40) * 0.25; moveZ = (Math.sin(angle)*dist/40) * 0.25;
                    }
                    if(t.identifier === lookId) {
                        yaw -= (t.clientX - lastX) * 0.005; pitch -= (t.clientY - lastY) * 0.005;
                        pitch = Math.max(-1.5, Math.min(1.5, pitch));
                        lastX = t.clientX; lastY = t.clientY;
                    }
                }
            }, {passive:false});
            window.addEventListener('touchend', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === moveId) { moveId = null; head.style.transform = ''; moveX = moveZ = 0; }
                    if(t.identifier === lookId) lookId = null;
                }
            });
        }

        function doAction() {
            if(chatOpen) return;
            ray.setFromCamera(new THREE.Vector2(0,0), camera); const h = ray.intersectObjects(blocks);
            if(h.length > 0) {
                const target = ITEMS[slot];
                const p=h[0].object.position, n=h[0].face.normal;
                if(gameMode === 'Limitless' || inv[target] > 0) {
                    addB(p.x+n.x*2, p.y+n.y*2, p.z+n.z*2, target, true);
                    if(gameMode === 'Survival') inv[target]--;
                } else {
                    if(gameMode==='Survival') inv[h[0].object.name]++;
                    scene.remove(h[0].object); blocks=blocks.filter(b=>b!==h[0].object);
                }
                drawHB();
            }
        }

        function bind() {
            window.onkeydown=e=>{
                if(e.code==='KeyT' && !chatOpen) { e.preventDefault(); toggleChat(); return; }
                if(chatOpen) return;
                if(e.code==='KeyW')moveZ=-0.35; if(e.code==='KeyS')moveZ=0.35; if(e.code==='KeyA')moveX=-0.35; if(e.code==='KeyD')moveX=0.35;
                if(e.code==='Space'){if(gameMode==='Limitless')camera.position.y+=1.5; else if(vY===0)vY=0.28;}
                if(e.code.startsWith('Digit')){slot=parseInt(e.code.slice(-1))-1; drawHB();}
            };
            window.onkeyup=()=> { if(!chatOpen) moveZ=moveX=0; };
            if(!isMobile) {
                document.onmousedown=e=>{
                    if(chatOpen) return;
                    ray.setFromCamera(new THREE.Vector2(0,0),camera); const h=ray.intersectObjects(blocks);
                    if(h.length>0){
                        if(e.button===0){ if(gameMode==='Survival') inv[h[0].object.name]++; scene.remove(h[0].object); blocks=blocks.filter(b=>b!==h[0].object); }
                        else if(gameMode==='Limitless' || inv[ITEMS[slot]] > 0){
                            const p=h[0].object.position, n=h[0].face.normal; addB(p.x+n.x*2,p.y+n.y*2,p.z+n.z*2,ITEMS[slot],true);
                            if(gameMode==='Survival') inv[ITEMS[slot]]--;
                        } drawHB();
                    }
                };
                document.body.onclick=()=> { if(!chatOpen) document.body.requestPointerLock(); };
                document.onmousemove=e=>{if(document.pointerLockElement && !chatOpen){yaw-=e.movementX*0.002; pitch-=e.movementY*0.002; pitch=Math.max(-1.5,1.5,pitch);}};
            }
        }

        function drawHB() {
            const h=document.getElementById('hb'); h.innerHTML='';
            ITEMS.forEach((it,i)=>h.innerHTML+=`<div class="slot ${i===slot?'active':''}" onclick="slot=${i};drawHB()">${it[0]}<span class="count">${inv[it]>0||inv[it]==="∞"?inv[it]:''}</span></div>`);
        }

        function clearInv() { if(confirm("Empty Hotbar?")) { for(let k in inv) inv[k] = (gameMode==='Limitless'?"∞":0); drawHB(); }}

        function loop() {
            requestAnimationFrame(loop); const dt=clock.getDelta(); gameTime+=dt;
            const cyc=gameTime%660; const night=cyc>360;
            document.getElementById('clock-ui').innerText=(night?"NIGHT ":"DAY ")+Math.floor((night?660-cyc:360-cyc)/60)+":"+Math.floor((night?660-cyc:360-cyc)%60).toString().padStart(2,'0');
            scene.background=new THREE.Color(night?0x050510:0x87CEEB); scene.fog.color.setHex(night?0x050510:0x87CEEB);
            sun.intensity=night?0.1:0.8; camera.rotation.set(pitch,yaw,0,'YXZ'); camera.translateZ(moveZ); camera.translateX(moveX);
            if(gameMode==='Survival'){vY-=0.012; camera.position.y+=vY; if(camera.position.y<10){camera.position.y=10;vY=0;}}
            if(gameMode==='Survival'){document.getElementById('hp-fill').style.width=hp+"%"; if(hp<=0)location.reload();}
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
